<!DOCTYPE html>
<html>
<head>
  <title>Certificate Verifier</title>
  <style>
    body {
      font-family: Arial;
      text-align:center;
      padding:40px;
      background:#0f172a;
      color:#e2e8f0;
    }
    .card {
      background:#111827;
      padding:20px;
      border-radius:12px;
      display:inline-block;
    }
    input, button {
      margin:10px;
      padding:10px;
      border-radius:8px;
      border:none;
    }
    button {
      background:#22c55e;
      color:white;
      cursor:pointer;
    }
  </style>
</head>
<body>

<div class="card">
  <h2>Upload Certificate</h2>

  <form method="POST" enctype="multipart/form-data">
    <input type="file" name="file" required>
    <br>
    <button type="submit">Check</button>
  </form>

  {% if result %}
    <h3>Result: {{ result.label }}</h3>
    <p>Confidence: {{ result.confidence }}</p>
    <p>Hash: {{ result.hash }}</p>
    <p>{{ result.chain }}</p>
  {% endif %}

</div>

</body>
</html>
